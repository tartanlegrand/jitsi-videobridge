# Override jvb-jvm to run with native-image-agent for config tracing
services:
  jvb-jvm:
    image: jvb-agent:latest
    build:
      context: ..
      dockerfile: Dockerfile.agent
    volumes:
      - ../config-full:/home/jvb/config:Z
      - ./agent-output:/app/config-output:Z
    entrypoint:
      - java
      - -agentlib:native-image-agent=config-output-dir=/app/config-output,config-write-period-secs=10,config-write-initial-delay-secs=0
      - -Dvideobridge.http-servers.private.host=0.0.0.0
      - -Dvideobridge.apis.rest.enabled=true
      - -Dvideobridge.stats.interval=5
      - -Dvideobridge.health.interval=5
      - -Dvideobridge.health.require-valid-address=false
      - -Djava.net.preferIPv4Stack=true
      - -Dconfig.file=/home/jvb/config/jvb.conf
      - -Dvideobridge.load-management.reducer-enabled=false
      - -jar
      - jvb.jar
