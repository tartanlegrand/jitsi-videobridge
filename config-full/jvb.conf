videobridge {
  apis {
    xmpp-client {
      configs {
        shard {
          HOSTNAME = "prosody"
          DOMAIN = "auth.meet.jitsi"
          USERNAME = "focus"
          PASSWORD = "focus"
          MUC_JIDS = "jvbbrewery@internal.auth.meet.jitsi"
          MUC_NICKNAME = "jvb1"
          DISABLE_CERTIFICATE_VERIFICATION = true
        }
      }
    }
  }
  ice {
    tcp {
      enabled = false
    }
    udp {
      port = 10000
    }
  }
  load-management {
    load-measurements {
      cpu-usage {
        // Native image reports inflated CPU — set threshold very high to avoid false overload
        load-threshold = 10.0
        recovery-threshold = 8.0
      }
    }
    reducer-enabled = false
  }
}
